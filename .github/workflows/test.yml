name: Test

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Increase level of test verbosity'
        required: false
        default: false
        type: boolean
  pull_request:
    types:
      - opened
      - synchronize
      - converted_to_draft
      - ready_for_review
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '!**.pyi'
      - 'tox.ini'
      - 'pyproject.toml'
      - 'pylock.toml'
      - '.github/codecov.yml'
      - '.github/actions/setup-tox/**'
      - '.github/actions/freebsd-vm/**'
      - '.github/actions/openbsd-vm/**'
      - '.github/actions/netbsd-vm/**'
      - '.github/actions/cache.conf'
      - '.github/workflows/test.yml'
  push:
    branches:
      - main
    tags-ignore:
      - '*'
    paths:
      - 'src/**'
      - 'tests/**'
      - '!**.pyi'
      - 'tox.ini'
      - 'pyproject.toml'
      - 'pylock.toml'
      - '.github/codecov.yml'
      - '.github/actions/setup-tox/**'
      - '.github/actions/freebsd-vm/**'
      - '.github/actions/openbsd-vm/**'
      - '.github/actions/netbsd-vm/**'
      - '.github/actions/cache.conf'
      - '.github/workflows/test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  PYTEST_VERBOSE_FLAG: ${{ inputs.verbose && '-v' || '' }}

jobs:
  tests:
    if: |
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version:'))
      && (github.event_name != 'pull_request' || (github.event.pull_request.draft != true && !contains(github.event.pull_request.labels.*.name, 'pr-skip-test')))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
        python_version: ['3.11', '3.12', '3.13', '3.14']
        include:
          - python_version: '3.11'
            tox_py: py311
          - python_version: '3.12'
            tox_py: py312
          - python_version: '3.13'
            tox_py: py313
          - python_version: '3.14'
            tox_py: py314

    name: test (${{ matrix.os }}, ${{ matrix.python_version }})
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup tox (python ${{ matrix.python_version }})
        uses: ./.github/actions/setup-tox
        with:
          python-version: ${{ matrix.python_version }}
          check-latest: true
      - name: Launch tests
        timeout-minutes: 20
        run: tox run -f ${{ matrix.tox_py }} -- ${{ env.PYTEST_VERBOSE_FLAG }}
      - name: Generate coverage report
        if: hashFiles('.coverage.*') != ''  # Rudimentary `file.exists()`
        continue-on-error: true
        run: tox run -f coverage
      - name: Upload (unit tests) coverage to codecov
        if: hashFiles('coverage.unit.xml') != ''  # Rudimentary `file.exists()`
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: >-
            coverage.unit.xml
          flags: >-
            test-unit
      - name: Upload (functional tests) coverage to codecov
        if: hashFiles('coverage.functional.xml') != ''  # Rudimentary `file.exists()`
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: >-
            coverage.functional.xml
          flags: >-
            test-functional,
            OS-${{ runner.os }},
            Py-${{ matrix.python_version }}

  test-freebsd:
    if: |
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version:'))
      && (github.event_name != 'pull_request' || (github.event.pull_request.draft != true && !contains(github.event.pull_request.labels.*.name, 'pr-skip-test')))
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_version: '14.3'
            python_version: '3.12'
            tox_py: py312
          - os_version: '15.0'
            python_version: '3.13'
            tox_py: py313
    env:
      # Since v7.6.11, coverage ships a pure python wheel (which is used on BSD) but the pure python Tracker always crashes.
      # This indicates pip not to use the .whl but the .tar.gz distribution in order to recompile the package in-place.
      PIP_NO_BINARY: coverage

    name: test (freebsd-${{ matrix.os_version }}, ${{ matrix.python_version }})
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Launch tests
        # Add 5 minutes to let the VM boot and install dependencies
        timeout-minutes: 25
        uses: ./.github/actions/freebsd-vm
        with:
          release: ${{ matrix.os_version }}
          python-version: ${{ matrix.python_version }}
          envs: >-
            PIP_NO_BINARY
          run: |
            export TOX_WORK_DIR=/tmp/.tox
            tox run -f ${{ matrix.tox_py }} -- ${{ env.PYTEST_VERBOSE_FLAG }}
            tox run -f coverage
      - name: Check files in workspace
        if: always()
        run: ls -lA
      - name: Upload (unit tests) coverage to codecov
        if: hashFiles('coverage.unit.xml') != ''  # Rudimentary `file.exists()`
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: >-
            coverage.unit.xml
          flags: >-
            test-unit
      - name: Upload (functional tests) coverage to codecov
        if: hashFiles('coverage.functional.xml') != ''  # Rudimentary `file.exists()`
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: >-
            coverage.functional.xml
          flags: >-
            test-functional,
            OS-FreeBSD,
            Py-${{ matrix.python_version }}

  test-openbsd:
    if: |
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version:'))
      && (github.event_name != 'pull_request' || (github.event.pull_request.draft != true && !contains(github.event.pull_request.labels.*.name, 'pr-skip-test')))
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_version: '7.8'
            python_version: '3.12'
            tox_py: py312
          - os_version: '7.9'
            python_version: '3.13'
            tox_py: py313
    env:
      # Since v7.6.11, coverage ships a pure python wheel (which is used on BSD) but the pure python Tracker always crashes.
      # This indicates pip not to use the .whl but the .tar.gz distribution in order to recompile the package in-place.
      PIP_NO_BINARY: coverage

    name: test (openbsd-${{ matrix.os_version }}, ${{ matrix.python_version }})
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Launch tests
        # Add 5 minutes to let the VM boot and install dependencies
        timeout-minutes: 25
        uses: ./.github/actions/openbsd-vm
        with:
          release: ${{ matrix.os_version }}
          python-version: ${{ matrix.python_version }}
          envs: >-
            PIP_NO_BINARY
          run: |
            export TOX_WORK_DIR=/tmp/.tox
            tox run -f ${{ matrix.tox_py }} -- ${{ env.PYTEST_VERBOSE_FLAG }}
            tox run -f coverage
      - name: Check files in workspace
        if: always()
        run: ls -lA
      - name: Upload (unit tests) coverage to codecov
        if: hashFiles('coverage.unit.xml') != ''  # Rudimentary `file.exists()`
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: >-
            coverage.unit.xml
          flags: >-
            test-unit
      - name: Upload (functional tests) coverage to codecov
        if: hashFiles('coverage.functional.xml') != ''  # Rudimentary `file.exists()`
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: >-
            coverage.functional.xml
          flags: >-
            test-functional,
            OS-OpenBSD,
            Py-${{ matrix.python_version }}

  test-netbsd:
    if: |
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version:'))
      && (github.event_name != 'pull_request' || (github.event.pull_request.draft != true && !contains(github.event.pull_request.labels.*.name, 'pr-skip-test')))
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - python_version: '3.12'
            tox_py: py312
          - python_version: '3.13'
            tox_py: py313
    env:
      # Since v7.6.11, coverage ships a pure python wheel (which is used on BSD) but the pure python Tracker always crashes.
      # This indicates pip not to use the .whl but the .tar.gz distribution in order to recompile the package in-place.
      PIP_NO_BINARY: coverage

    name: test (netbsd-10.1, ${{ matrix.python_version }})
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Launch tests
        # Add 5 minutes to let the VM boot and install dependencies
        timeout-minutes: 25
        uses: ./.github/actions/netbsd-vm
        with:
          release: '10.1'
          python-version: ${{ matrix.python_version }}
          envs: >-
            PIP_NO_BINARY
          run: |
            export TOX_WORK_DIR=/tmp/.tox
            tox run -f ${{ matrix.tox_py }} -- ${{ env.PYTEST_VERBOSE_FLAG }}
            tox run -f coverage
      - name: Check files in workspace
        if: always()
        run: ls -lA
      - name: Upload (unit tests) coverage to codecov
        if: hashFiles('coverage.unit.xml') != ''  # Rudimentary `file.exists()`
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: >-
            coverage.unit.xml
          flags: >-
            test-unit
      - name: Upload (functional tests) coverage to codecov
        if: hashFiles('coverage.functional.xml') != ''  # Rudimentary `file.exists()`
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: >-
            coverage.functional.xml
          flags: >-
            test-functional,
            OS-NetBSD,
            Py-${{ matrix.python_version }}
